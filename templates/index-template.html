<!DOCTYPE html>
<html lang="en">
<head>
<script src="auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relevance Index Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0B0E1A;
    --bg-card: #111827;
    --bg-card-hover: #1a2235;
    --border: #1E293B;
    --text-primary: #E2E8F0;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --blue-400: #60A5FA;
    --blue-500: #3B82F6;
    --blue-600: #2563EB;
    --purple-400: #A78BFA;
    --purple-500: #8B5CF6;
    --purple-600: #7C3AED;
    --green-400: #4ADE80;
    --red-400: #F87171;
    --amber-400: #FBBF24;
    --cyan-400: #22D3EE;
    --gradient-blue-purple: linear-gradient(135deg, #3B82F6, #8B5CF6);
    --gradient-bg: linear-gradient(180deg, #0B0E1A 0%, #111236 100%);
  }

  [data-theme="light"] {
    --bg-primary: #F8FAFC;
    --bg-card: #FFFFFF;
    --bg-card-hover: #F1F5F9;
    --border: #E2E8F0;
    --text-primary: #1E293B;
    --text-secondary: #475569;
    --text-muted: #94A3B8;
    --blue-400: #3B82F6;
    --blue-500: #2563EB;
    --blue-600: #1D4ED8;
    --purple-400: #8B5CF6;
    --purple-500: #7C3AED;
    --purple-600: #6D28D9;
    --green-400: #22C55E;
    --red-400: #EF4444;
    --amber-400: #F59E0B;
    --cyan-400: #06B6D4;
    --gradient-blue-purple: linear-gradient(135deg, #2563EB, #7C3AED);
    --gradient-bg: linear-gradient(180deg, #F8FAFC 0%, #EFF6FF 100%);
  }

  [data-theme="light"] .nav-bar {
    background: rgba(248, 250, 252, 0.92);
  }

  [data-theme="light"] .nav-menu {
    background: rgba(255, 255, 255, 0.98);
  }

  .theme-toggle {
    background: none;
    border: 1px solid var(--text-muted);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: var(--text-secondary);
    transition: border-color 0.2s, color 0.2s;
  }

  .theme-toggle:hover {
    border-color: var(--blue-400);
    color: var(--blue-400);
  }

  body {
    font-family: 'Fira Sans', sans-serif;
    background: var(--gradient-bg);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  .dashboard {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* NAV */
  .nav-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(11, 14, 26, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-page-title {
    font-family: 'Fira Code', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text-primary);
    background: var(--gradient-blue-purple);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hamburger {
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    padding: 0.4rem;
    border: none;
    background: none;
    z-index: 102;
  }

  .hamburger span {
    display: block;
    width: 20px;
    height: 2px;
    background: var(--text-secondary);
    border-radius: 2px;
    transition: transform 0.3s, opacity 0.3s;
  }

  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }

  .nav-menu {
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    width: 220px;
    height: 100vh;
    background: rgba(17, 24, 39, 0.98);
    border-left: 1px solid var(--border);
    padding: 4rem 1.5rem 2rem;
    z-index: 101;
    flex-direction: column;
    gap: 0.25rem;
  }

  .nav-menu.open { display: flex; }

  .nav-menu a {
    display: block;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    font-family: 'Fira Code', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    text-decoration: none;
    color: var(--text-secondary);
    transition: background 0.2s, color 0.2s;
  }

  .nav-menu a:hover { background: rgba(96, 165, 250, 0.08); color: var(--blue-400); }
  .nav-menu a.active { color: var(--blue-400); background: rgba(96, 165, 250, 0.12); }

  .nav-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 100;
  }

  .nav-overlay.open { display: block; }

  /* Health Check KPIs */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: border-color 0.2s, background 0.2s;
  }

  .kpi-card:hover { border-color: var(--blue-500); background: var(--bg-card-hover); }

  .kpi-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .kpi-value {
    font-family: 'Fira Code', monospace;
    font-size: 2rem;
    font-weight: 700;
    background: var(--gradient-blue-purple);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .kpi-sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }

  /* Section headers */
  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
    margin-top: 2rem;
  }

  .section-header h2 {
    font-family: 'Fira Code', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  .section-header .badge {
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    font-family: 'Fira Code', monospace;
  }

  .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue-400); }
  .badge-purple { background: rgba(139,92,246,0.15); color: var(--purple-400); }
  .badge-green { background: rgba(74,222,128,0.15); color: var(--green-400); }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: var(--purple-500); }

  .card-title {
    font-family: 'Fira Code', monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 1rem;
  }

  /* Tables */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  .data-table th {
    font-family: 'Fira Code', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    text-align: left;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .data-table td {
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid rgba(30,41,59,0.5);
    color: var(--text-secondary);
  }

  .data-table tr:hover td { background: rgba(59,130,246,0.04); }

  .data-table .source-name { color: var(--text-primary); font-weight: 500; }

  /* Status badges */
  .status {
    display: inline-block;
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-family: 'Fira Code', monospace;
    white-space: nowrap;
  }

  .status-top { background: rgba(59,130,246,0.15); color: var(--blue-400); }
  .status-strong { background: rgba(139,92,246,0.15); color: var(--purple-400); }
  .status-moderate { background: rgba(148,163,184,0.15); color: var(--text-secondary); }
  .status-watching { background: rgba(251,191,36,0.15); color: var(--amber-400); }
  .status-blocked { background: rgba(248,113,113,0.15); color: var(--red-400); }
  .status-monitor { background: rgba(100,116,139,0.15); color: var(--text-muted); }

  /* Score cell */
  .score-positive { color: var(--blue-400); font-family: 'Fira Code', monospace; font-weight: 600; }
  .score-negative { color: var(--red-400); font-family: 'Fira Code', monospace; font-weight: 600; }
  .score-zero { color: var(--text-muted); font-family: 'Fira Code', monospace; }

  /* Streak bar */
  .streak-bar { display: flex; gap: 3px; align-items: center; }
  .streak-dot { width: 8px; height: 8px; border-radius: 2px; }
  .streak-active { background: var(--blue-400); }
  .streak-inactive { background: var(--border); }

  /* Insights panel */
  .insights-panel {
    background: linear-gradient(135deg, rgba(59,130,246,0.06), rgba(139,92,246,0.06));
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 12px;
    padding: 1.25rem;
    margin-top: 1rem;
  }

  .insights-panel h3 {
    font-family: 'Fira Code', monospace;
    font-size: 0.8rem;
    color: var(--purple-400);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .insights-panel ul { list-style: none; padding: 0; }

  .insights-panel li {
    font-size: 0.82rem;
    color: var(--text-secondary);
    padding: 0.35rem 0;
    padding-left: 1rem;
    position: relative;
    line-height: 1.5;
  }

  .insights-panel li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.7rem;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--purple-400);
  }

  /* Footer */
  .page-footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    margin-top: 2rem;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .dashboard { padding: 1rem; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 1024px) {
    .data-table { font-size: 0.78rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; }
  }
</style>
</head>
<body>

<div class="dashboard">

  <nav class="nav-bar">
    <div class="nav-page-title">Relevance Index</div>
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="nav-overlay" id="nav-overlay"></div>
  <div class="nav-menu" id="nav-menu">
    <a href="landing.html">Home</a>
    <a href="briefing.html">/today</a>
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="network.html">Network</a>
    <a href="social.html">Social</a>
  <a href="updates.html">Updates</a>
  <a href="system-diagram.html">System</a>
  </div>
  <script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');
    const navOverlay = document.getElementById('nav-overlay');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navMenu.classList.toggle('open');
      navOverlay.classList.toggle('open');
    });
    navOverlay.addEventListener('click', () => {
      hamburger.classList.remove('open');
      navMenu.classList.remove('open');
      navOverlay.classList.remove('open');
    });
    const themeToggle = document.getElementById('theme-toggle');
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      themeToggle.textContent = t === 'dark' ? '\u2600' : '\u263E';
      localStorage.setItem('theme', t);
    }
    setTheme(localStorage.getItem('theme') || 'dark');
    themeToggle.addEventListener('click', () => {
      setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  </script>


  <!-- DATA:START -->
  <!-- KPI cards, Intel Sources table, Influencers table, Companies table.
       This section is accumulative: existing rows are UPDATED with new scores,
       new sources are ADDED, tables re-sorted by relevance_score descending.
  -->
  <!-- DATA:END -->

</div>

</body>
</html>
