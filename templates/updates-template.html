<!DOCTYPE html>
<html lang="en">
<head>
<script src="auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Improvements — How I AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0B0E1A;
    --bg-card: #111827;
    --bg-card-hover: #1a2235;
    --border: #1E293B;
    --border-light: #2a3654;
    --text-primary: #E2E8F0;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --blue-400: #60A5FA;
    --blue-500: #3B82F6;
    --purple-400: #A78BFA;
    --green-400: #4ADE80;
    --red-400: #F87171;
    --amber-400: #FBBF24;
    --cyan-400: #22D3EE;
    --gradient-blue-purple: linear-gradient(135deg, #3B82F6, #8B5CF6);
  }

  [data-theme="light"] {
    --bg-primary: #F8FAFC;
    --bg-card: #FFFFFF;
    --bg-card-hover: #F1F5F9;
    --border: #E2E8F0;
    --border-light: #CBD5E1;
    --text-primary: #1E293B;
    --text-secondary: #475569;
    --text-muted: #94A3B8;
    --blue-400: #3B82F6;
    --blue-500: #2563EB;
    --purple-400: #8B5CF6;
    --green-400: #22C55E;
    --red-400: #EF4444;
    --amber-400: #F59E0B;
    --cyan-400: #06B6D4;
    --gradient-blue-purple: linear-gradient(135deg, #2563EB, #7C3AED);
  }

  [data-theme="light"] .nav { background: rgba(248, 250, 252, 0.92); }
  [data-theme="light"] .nav-menu { background: rgba(255, 255, 255, 0.98); }

  .theme-toggle {
    background: none; border: 1px solid var(--text-muted); border-radius: 50%;
    width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 0.85rem; color: var(--text-secondary);
    transition: border-color 0.2s, color 0.2s;
  }
  .theme-toggle:hover { border-color: var(--blue-400); color: var(--blue-400); }

  body {
    font-family: 'Fira Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(11, 14, 26, 0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-page-title {
    font-family: 'Fira Code', monospace; font-size: 1.4rem; font-weight: 700;
    background: var(--gradient-blue-purple);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hamburger {
    display: flex; flex-direction: column; gap: 4px; cursor: pointer;
    padding: 0.4rem; border: none; background: none; z-index: 102;
  }
  .hamburger span { display: block; width: 20px; height: 2px; background: var(--text-secondary); border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }

  .nav-menu {
    display: none; position: fixed; top: 0; right: 0; width: 220px; height: 100vh;
    background: rgba(17, 24, 39, 0.98); border-left: 1px solid var(--border);
    padding: 4rem 1.5rem 2rem; z-index: 101; flex-direction: column; gap: 0.25rem;
  }
  .nav-menu.open { display: flex; }
  .nav-menu a {
    display: block; padding: 0.5rem 0.75rem; border-radius: 8px;
    font-family: 'Fira Code', monospace; font-size: 0.75rem; font-weight: 500;
    text-decoration: none; color: var(--text-secondary); transition: background 0.2s, color 0.2s;
  }
  .nav-menu a:hover { background: rgba(96, 165, 250, 0.08); color: var(--blue-400); }
  .nav-menu a.active { color: var(--blue-400); background: rgba(96, 165, 250, 0.12); }
  .nav-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 100; }
  .nav-overlay.open { display: block; }

  /* CONTENT */
  .content { max-width: 900px; margin: 0 auto; padding: 2rem; }

  .page-header {
    text-align: center; padding: 3rem 2rem 2rem;
  }
  .page-header h1 {
    font-family: 'Fira Code', monospace; font-size: 1.8rem; font-weight: 700;
    background: var(--gradient-blue-purple);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .page-header .sub {
    font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;
    font-family: 'Fira Code', monospace;
  }

  /* CATEGORY HEADERS */
  .category-header {
    font-family: 'Fira Code', monospace; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase; margin: 2.5rem 0 1rem;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .category-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .cat-critical { color: var(--red-400); }
  .cat-recommended { color: var(--amber-400); }
  .cat-consider { color: var(--blue-400); }
  .cat-working { color: var(--green-400); }

  /* CARDS */
  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.25rem 1.5rem; margin-bottom: 0.75rem; transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border-light); }
  .card.critical { border-left: 4px solid var(--red-400); }
  .card.recommended { border-left: 4px solid var(--amber-400); }
  .card.consider { border-left: 4px solid var(--blue-400); }
  .card.working { border-left: 4px solid var(--green-400); }

  .card-title { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); margin-bottom: 0.5rem; }
  .card p { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.7; margin-bottom: 0.4rem; }
  .card strong { color: var(--text-primary); }

  .card-meta {
    font-size: 0.72rem; color: var(--text-muted); margin-top: 0.75rem;
    font-family: 'Fira Code', monospace; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;
  }
  .tag {
    display: inline-block; background: rgba(96,165,250,0.1); border-radius: 4px;
    padding: 0.1rem 0.5rem; font-size: 0.65rem; color: var(--blue-400);
  }
  .status-open { color: var(--amber-400); }
  .status-done { color: var(--green-400); }
  .status-escalated { color: var(--red-400); }

  /* WEEKEND PLAN */
  .weekend-plan {
    background: linear-gradient(135deg, rgba(59,130,246,0.06), rgba(139,92,246,0.06));
    border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin: 2rem 0;
  }
  .weekend-plan h3 {
    font-family: 'Fira Code', monospace; font-size: 0.85rem; font-weight: 700;
    color: var(--purple-400); margin-bottom: 1rem;
  }
  .weekend-plan .plan-section { margin-bottom: 1.25rem; }
  .weekend-plan .plan-label {
    font-family: 'Fira Code', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem;
  }
  .weekend-plan .auto-fix .plan-label { color: var(--green-400); }
  .weekend-plan \.needs-owner .plan-label { color: var(--amber-400); }
  .weekend-plan .deferred .plan-label { color: var(--text-muted); }
  .weekend-plan li {
    color: var(--text-secondary); font-size: 0.85rem; line-height: 1.7;
    margin-bottom: 0.3rem; margin-left: 1.25rem;
  }

  /* FOOTER */
  .updates-footer {
    text-align: center; padding: 2rem; border-top: 1px solid var(--border); margin-top: 2rem;
  }
  .updates-footer .made-with { font-size: 0.7rem; color: var(--text-muted); }

  @media (max-width: 700px) {
    .content { padding: 1rem; }
    .page-header h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-page-title">System Updates</div>
  <div style="display:flex;align-items:center;gap:0.5rem;">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="nav-overlay" id="nav-overlay"></div>
<div class="nav-menu" id="nav-menu">

  <a href="network.html">Network</a>
  <a href="social.html">Social</a>
  <a href="updates.html" class="active">Updates</a>
  <a href="system-diagram.html">System</a>
</div>
<script>
  const hamburger = document.getElementById('hamburger');
  const navMenu = document.getElementById('nav-menu');
  const navOverlay = document.getElementById('nav-overlay');
  hamburger.addEventListener('click', () => { hamburger.classList.toggle('open'); navMenu.classList.toggle('open'); navOverlay.classList.toggle('open'); });
  navOverlay.addEventListener('click', () => { hamburger.classList.remove('open'); navMenu.classList.remove('open'); navOverlay.classList.remove('open'); });
  const themeToggle = document.getElementById('theme-toggle');
  function setTheme(t) { document.documentElement.setAttribute('data-theme', t); themeToggle.textContent = t === 'dark' ? '\u2600' : '\u263E'; localStorage.setItem('theme', t); }
  setTheme(localStorage.getItem('theme') || 'dark');
  themeToggle.addEventListener('click', () => { setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); });
</script>

<!-- DATA:START -->

     The self-update agent reads existing cards, updates them, and adds new ones.

</body>
</html>
